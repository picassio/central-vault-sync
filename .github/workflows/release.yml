name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Verify tag and build plugin
              run: |
                  npm ci
                  tag="${GITHUB_REF#refs/tags/}"
                  test "$tag" = "$(node -p "require('./manifest.json').version")"
                  test "$(git cat-file -t "refs/tags/$tag")" = commit || {
                    echo "Release tags must be lightweight so provenance source digests match the tag ref." >&2
                    exit 1
                  }
                  npm run check

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            # Keep one subject per statement. Obsidian's Community scanner verifies
            # each release asset against a single-subject provenance bundle.
            - name: Attest main.js build provenance
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: main.js

            - name: Attest manifest.json build provenance
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: manifest.json

            - name: Attest styles.css build provenance
              if: steps.styles.outputs.exists == 'true'
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: styles.css

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
